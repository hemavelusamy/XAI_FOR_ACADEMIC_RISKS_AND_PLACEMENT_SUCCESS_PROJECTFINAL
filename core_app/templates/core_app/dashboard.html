<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>
    body {
        background: #0f172a; color: #f8fafc; font-family: 'Poppins', sans-serif;
        background-image: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
    }

    .glass-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 30px;
        height: 100%;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    .form-input {
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid #334155;
        color: #cbd5e1; border-radius: 10px; margin-bottom: 15px;
    }

    .btn-predict {
        background: #3b82f6; border: none; font-weight: 700;
        padding: 15px; border-radius: 12px; letter-spacing: 1px;
    }

    /* Result Card Dynamic Styling */
    .result-success { border-left: 8px solid #10b981; }
    .result-danger { border-left: 8px solid #f43f5e; }

    .status-badge {
        padding: 8px 20px; border-radius: 50px; font-weight: 700;
        font-size: 24px; display: inline-block;
    }
</style>

<div class="container py-5">
    <div class="row mb-5 text-center">
        <h1 class="fw-bold">Academic <span class="text-primary">Placement</span> Dashboard</h1>
        <p class="text-secondary">Predicting student readiness with Explainable AI logic.</p>
    </div>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="glass-card shadow">
                <h4 class="mb-4"><i class="fas fa-user-graduate me-2"></i>Student Metrics</h4>
                <form method="POST">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-6"><input type="number" step="0.1" name="cgpa" class="form-control form-input" placeholder="CGPA" required></div>
                        <div class="col-md-6"><input type="number" name="attendance" class="form-control form-input" placeholder="Attendance (%)" required></div>
                        <div class="col-md-6"><input type="number" name="projects" class="form-control form-input" placeholder="Projects Done" required></div>
                        <div class="col-md-6"><input type="number" name="internship" class="form-control form-input" placeholder="Internships (0/1)" required></div>
                        <div class="col-12"><input type="number" name="comm_score" class="form-control form-input" placeholder="Communication Score (1-10)" required></div>
                    </div>
                    <button type="submit" class="btn btn-predict btn-primary w-100 mt-3">ANALYZE READINESS</button>
                </form>
            </div>
        </div>

        {% if prediction %}
        <div class="col-lg-6">
            <div class="glass-card {% if prediction == 'Placed' %}result-success{% else %}result-danger{% endif %}">
                <h4 class="mb-4"><i class="fas fa-chart-pie me-2"></i>Analysis Result</h4>
                <div class="mb-4">
                    <span class="status-badge {% if prediction == 'Placed' %}text-success{% else %}text-danger{% endif %}">
                        {{ prediction|upper }}
                    </span>
                </div>
                <div class="p-3 bg-dark rounded-3" style="border: 1px solid #334155;">
                    <p class="text-secondary mb-1 fw-bold">XAI INSIGHTS:</p>
                    <p class="mb-0 text-white">{{ reason }}</p>
                </div>
            </div>
        </div>
        {% endif %}
    </div>
</div>
