<!DOCTYPE html>
<html>
<head>
    <title>Faculty Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary p-3">
        <a class="navbar-brand" href="#">Faculty Dashboard</a>
    </nav>
    <div class="container mt-4">
        <h3>Welcome, Faculty</h3>
        <p>Student performance prediction results will be displayed here.</p>
    </div>
    <div class="container">
    <h2>Academic Placement Dashboard</h2>
    
    <div class="result-box">
        <h3>Placement Prediction Status:</h3>
        <p style="font-size: 24px; font-weight: bold; color: blue;">
            <form method="POST">
    {% csrf_token %}
    <input type="number" step="0.1" name="cgpa" placeholder="Enter CGPA" required>
    <input type="number" name="attendance" placeholder="Enter Attendance" required>
    <button type="submit">Predict</button>
</form>

<div class="result-box">
    <h3>Placement Prediction Status:</h3>
    <p style="font-size: 24px; font-weight: bold; color: blue;">
        {{ prediction }}
    </p>
</div>
            {{ prediction }}
        </p>
    </div>
</div>
</body>
</html>
