<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
        height: 100vh; display: flex; align-items: center; justify-content: center;
        background: #0f172a; /* Deep Navy Base */
        background-image: 
            radial-gradient(at 0% 0%, hsla(217,100%,50%,0.15) 0, transparent 50%), 
            radial-gradient(at 100% 100%, hsla(142,100%,50%,0.1) 0, transparent 50%);
        overflow: hidden;
    }

    .glass-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 25px;
        padding: 50px;
        width: 100%; max-width: 450px;
        box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    }

    .form-control {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white; border-radius: 12px; padding: 12px;
    }

    .form-control:focus {
        background: rgba(255, 255, 255, 0.12);
        color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        border-color: #3b82f6;
    }

    .btn-login {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        border: none; color: white; font-weight: 600;
        padding: 12px; border-radius: 12px; transition: 0.3s;
    }

    .btn-login:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4); }
</style>

<div class="glass-card text-center">
    <h2 class="text-white fw-bold mb-4">Faculty Login</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>
        <div class="mb-4">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-login w-100">Sign In</button>
    </form>
</div>
